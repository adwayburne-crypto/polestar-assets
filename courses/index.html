<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Polestar Courses — Iso Fit & Yoga Senses Hong Kong</title>
<link rel="stylesheet" href="assets/tokens.css" />
<style>
  /* ---- Widget shell: inherits Iso Fit tokens from tokens.css ---- */
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: var(--font-sans, 'Poppins', system-ui, sans-serif);
    color: var(--fg-1, #1a1a1a);
    background: var(--bg-1, #fff);
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 40px 24px 64px; }

  .head { margin-bottom: 28px; }
  .eyebrow {
    font-size: 12px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase;
    color: var(--accent-text, #5a7350);
  }
  .head h1 { font-size: clamp(26px, 4vw, 38px); line-height: 1.12; margin: 10px 0 8px; font-weight: 600; }
  .head p { margin: 0; color: var(--fg-2, #807f82); font-size: 15px; max-width: 620px; }

  /* ---- Filter chips ---- */
  .filters { display: flex; flex-wrap: wrap; gap: 8px; margin: 24px 0 8px; }
  .filters .label { width: 100%; font-size: 11px; font-weight: 600; letter-spacing: .1em;
    text-transform: uppercase; color: var(--fg-3, #a3a2a5); margin-top: 8px; }
  .chip {
    font-family: inherit; font-size: 13px; font-weight: 600; padding: 8px 16px;
    border-radius: 999px; cursor: pointer; border: 1.5px solid var(--border-strong, #d4d3d6);
    background: #fff; color: var(--fg-2, #807f82); transition: all .15s ease;
  }
  .chip:hover { border-color: var(--black, #1a1a1a); color: var(--fg-1, #1a1a1a); }
  .chip[aria-pressed="true"] { background: var(--black, #1a1a1a); border-color: var(--black, #1a1a1a); color: #fff; }

  /* ---- Month group ---- */
  .month { margin-top: 40px; }
  .month > h2 {
    font-size: 14px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase;
    color: var(--fg-2, #807f82); margin: 0 0 16px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border, #e8e7e9);
  }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px; }

  /* ---- Course card ---- */
  .card {
    display: flex; gap: 16px; background: #fff; border: 1px solid var(--border, #e8e7e9);
    border-radius: var(--radius-lg, 16px); padding: 18px 20px; transition: all .2s ease;
  }
  .card:hover { box-shadow: var(--shadow-lg, 0 12px 32px rgba(0,0,0,.1)); transform: translateY(-3px); }
  .card.is-cancelled { opacity: .55; }

  /* Date block */
  .date { flex: 0 0 56px; text-align: center; }
  .date .d { font-size: 26px; font-weight: 700; line-height: 1; color: var(--fg-1, #1a1a1a); }
  .date .m { font-size: 12px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--accent-text, #5a7350); margin-top: 4px; }
  .date .yr { font-size: 11px; color: var(--fg-3, #a3a2a5); margin-top: 2px; }

  .body { flex: 1; min-width: 0; }
  .badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .badge {
    font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 999px;
    background: var(--sage-100, #eaf1e6); color: var(--sage-700, #5a7350);
  }
  /* These are Polestar education courses -> Polestar Yellow accent (reserved use). */
  .badge.format { background: #fdf0d3; color: #8a6200; }
  .badge.cancel { background: #fbe2e2; color: #9a2a2a; }
  .badge.earlybird { background: var(--accent, #b0c8a6); color: var(--black, #1a1a1a); display: inline-flex; align-items: center; gap: 5px; }
  .badge.earlybird svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }

  .card h3 { font-size: 16px; line-height: 1.35; margin: 0 0 10px; font-weight: 600; }
  .meta { display: flex; flex-wrap: wrap; gap: 6px 16px; font-size: 13px; color: var(--fg-2, #807f82); }
  .meta span { display: inline-flex; align-items: center; gap: 6px; }
  .meta svg { width: 15px; height: 15px; stroke: var(--fg-2, #807f82); fill: none; stroke-width: 1.8; }
  .price { font-weight: 600; color: var(--fg-1, #1a1a1a); }

  .cta {
    margin-top: 14px; display: inline-flex; align-items: center; gap: 6px;
    font-family: inherit; font-size: 13px; font-weight: 600; text-decoration: none;
    color: var(--fg-1, #1a1a1a); background: var(--accent, #b0c8a6);
    padding: 9px 16px; border-radius: 999px; border: none; cursor: pointer; transition: all .15s ease;
  }
  .cta:hover { background: var(--accent-hover, #8aa67e); }
  .cta svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

  .empty { padding: 48px 0; text-align: center; color: var(--fg-2, #807f82); }
  .foot { margin-top: 48px; font-size: 12px; color: var(--fg-3, #a3a2a5); }
  @media (max-width: 480px) { .wrap { padding: 28px 16px 48px; } .card { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <header class="head">
    <span class="eyebrow">Polestar Pilates Education</span>
    <h1>Upcoming Courses</h1>
    <p>Polestar Pilates qualification courses hosted at Iso Fit and Yoga Senses, Hong Kong. Dates pulled live from our course registry.</p>
  </header>

  <div class="filters" id="filters"></div>
  <div id="list"></div>
  <p class="foot" id="foot"></p>
</div>

<script>
  // ----- Configuration -----
  const CTA_LABEL = "Learn More";   // links out to each course's PPA landing page

  const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const ICONS = {
    pin: '<svg viewBox="0 0 24 24"><path d="M12 21s-7-6.5-7-11a7 7 0 0114 0c0 4.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>',
    cal: '<svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>',
    arrow: '<svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>',
    spark: '<svg viewBox="0 0 24 24"><path d="M12 3v4M12 17v4M3 12h4M17 12h4M6 6l2.5 2.5M15.5 15.5L18 18M18 6l-2.5 2.5M8.5 15.5L6 18"/></svg>',
  };

  const state = { venue: "All", format: "All", data: [] };

  function fmtDate(iso) {
    const d = new Date(iso);
    return { d: d.getDate(), m: MONTHS[d.getMonth()], yr: d.getFullYear(),
             long: `${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}` };
  }
  function monthKey(iso) { const d = new Date(iso); return `${MONTHS[d.getMonth()]} ${d.getFullYear()}`; }

  function buildFilters() {
    const venues = ["All", ...new Set(state.data.map(c => c.venue))];
    const formats = ["All", ...new Set(state.data.map(c => c.format))];
    const el = document.getElementById("filters");
    el.innerHTML = "";
    const group = (label, key, vals) => {
      const lab = document.createElement("div"); lab.className = "label"; lab.textContent = label; el.appendChild(lab);
      vals.forEach(v => {
        const b = document.createElement("button");
        b.className = "chip"; b.textContent = v;
        b.setAttribute("aria-pressed", state[key] === v);
        b.onclick = () => { state[key] = v; render(); buildFilters(); };
        el.appendChild(b);
      });
    };
    group("Venue", "venue", venues);
    group("Format", "format", formats);
  }

  // Tell a parent page (the WordPress iframe embed) how tall we are, so it can
  // resize the iframe and avoid an inner scrollbar. Safe no-op when not embedded.
  function reportHeight() {
    const h = document.body.scrollHeight;
    if (window.parent !== window) window.parent.postMessage({ isofitCalHeight: h }, "*");
  }

  function render() {
    const list = document.getElementById("list");
    const shown = state.data.filter(c =>
      (state.venue === "All" || c.venue === state.venue) &&
      (state.format === "All" || c.format === state.format));

    if (!shown.length) { list.innerHTML = '<p class="empty">No upcoming courses match this filter.</p>'; return; }

    const groups = {};
    shown.forEach(c => { (groups[monthKey(c.start)] ||= []).push(c); });

    list.innerHTML = Object.entries(groups).map(([month, courses]) => `
      <section class="month">
        <h2>${month}</h2>
        <div class="grid">
          ${courses.map(card).join("")}
        </div>
      </section>`).join("");
    reportHeight();
  }

  function ebBadge(eb) {
    if (!eb) return "";
    const until = new Date(eb.until + "T00:00:00");
    const by = `${until.getDate()} ${MONTHS[until.getMonth()]}`;
    return `<span class="badge earlybird">${ICONS.spark} Early Bird −${eb.pct}% · until ${by}</span>`;
  }

  function card(c) {
    const s = fmtDate(c.start);
    const end = c.end ? fmtDate(c.end) : null;
    const range = end && end.long !== s.long ? `${s.long} – ${end.long}` : s.long;
    const href = c.cancelled ? null : c.url;
    return `
      <article class="card ${c.cancelled ? "is-cancelled" : ""}">
        <div class="date"><div class="d">${s.d}</div><div class="m">${s.m}</div><div class="yr">${s.yr}</div></div>
        <div class="body">
          <div class="badges">
            <span class="badge format">${c.format}</span>
            ${ebBadge(c.early_bird)}
            ${c.cancelled ? '<span class="badge cancel">Cancelled</span>' : ""}
          </div>
          <h3>${escapeHtml(c.title)}</h3>
          <div class="meta">
            <span>${ICONS.cal} ${range}</span>
            <span>${ICONS.pin} ${escapeHtml(c.venue)}</span>
            ${c.price ? `<span class="price">${c.price}</span>` : ""}
          </div>
          ${href ? `<a class="cta" href="${href}" target="_blank" rel="noopener">${CTA_LABEL} ${ICONS.arrow}</a>` : ""}
        </div>
      </article>`;
  }

  function escapeHtml(s) { return String(s ?? "").replace(/[&<>"']/g, m =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m])); }

  fetch("courses.json?_=" + Date.now())
    .then(r => r.json())
    .then(payload => {
      state.data = payload.courses || [];
      buildFilters();
      render();
      if (payload.generated_at) {
        const g = new Date(payload.generated_at);
        document.getElementById("foot").textContent =
          `${payload.count} upcoming course${payload.count === 1 ? "" : "s"} · updated ${g.toLocaleString("en-GB", { dateStyle: "medium", timeStyle: "short" })}`;
      }
    })
    .catch(() => { document.getElementById("list").innerHTML =
      '<p class="empty">Course schedule is temporarily unavailable. Please check back shortly.</p>'; reportHeight(); });

  window.addEventListener("resize", reportHeight);
  window.addEventListener("load", reportHeight);
</script>
</body>
</html>
